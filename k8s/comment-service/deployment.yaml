apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: blog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
        - name: comment-service
          image: 884128492474.dkr.ecr.us-west-2.amazonaws.com/blog-platform:comment-service
          command: ["sh", "-c", "npx prisma db push --skip-generate && node dist/index.js"]
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: db-comments-url
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
