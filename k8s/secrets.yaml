apiVersion: v1
kind: Secret
metadata:
  name: blog-secrets
  namespace: blog
type: Opaque
stringData:
  jwt-secret: "production-jwt-secret-change-this"
  db-auth-url: "mysql://admin:password@rds-endpoint:3306/auth_db"
  db-posts-url: "mysql://admin:password@rds-endpoint:3306/posts_db"
  db-comments-url: "mysql://admin:password@rds-endpoint:3306/comments_db"
