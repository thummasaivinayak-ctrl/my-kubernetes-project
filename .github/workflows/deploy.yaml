name: Build and Deploy

on:
  # To enable automatic deployment on push, uncomment the lines below:
  # push:
  #   branches: [main]

  # Manual trigger enabled to prevent automatic builds while cluster is down
  workflow_dispatch: 

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER: blog-cluster

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.changes.outputs.auth }}
      post: ${{ steps.changes.outputs.post }}
      comment: ${{ steps.changes.outputs.comment }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            post:
              - 'services/post-service/**'
            comment:
              - 'services/comment-service/**'
            frontend:
              - 'frontend/**'

  build-and-deploy-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/blog-auth-service:${{ github.sha }}
          docker build -t $IMAGE ./services/auth-service
          docker push $IMAGE
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl set image deployment/auth-service auth-service=${{ steps.ecr.outputs.registry }}/blog-auth-service:${{ github.sha }} -n blog

  build-and-deploy-post:
    needs: detect-changes
    if: needs.detect-changes.outputs.post == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/blog-post-service:${{ github.sha }}
          docker build -t $IMAGE ./services/post-service
          docker push $IMAGE
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl set image deployment/post-service post-service=${{ steps.ecr.outputs.registry }}/blog-post-service:${{ github.sha }} -n blog

  build-and-deploy-comment:
    needs: detect-changes
    if: needs.detect-changes.outputs.comment == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/blog-comment-service:${{ github.sha }}
          docker build -t $IMAGE ./services/comment-service
          docker push $IMAGE
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl set image deployment/comment-service comment-service=${{ steps.ecr.outputs.registry }}/blog-comment-service:${{ github.sha }} -n blog

  build-and-deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/blog-frontend:${{ github.sha }}
          docker build -t $IMAGE ./frontend
          docker push $IMAGE
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl set image deployment/frontend frontend=${{ steps.ecr.outputs.registry }}/blog-frontend:${{ github.sha }} -n blog
