apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: blog-cluster
  region: us-west-2
  version: "1.31"

managedNodeGroups:
  - name: blog-workers
    instanceType: t3a.medium
    minSize: 2
    maxSize: 5
    desiredCapacity: 3
    volumeSize: 20
    amiFamily: AmazonLinux2
    iam:
      withAddonPolicies:
        autoScaler: true
        albIngress: true
        cloudWatch: true

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
